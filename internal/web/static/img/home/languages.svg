<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 256" font-family="ui-monospace,'Cascadia Code',Menlo,Consolas,monospace">
  <rect width="640" height="256" fill="#0b120e"/>
  <text xml:space="preserve" x="24" y="36" font-size="15"><tspan fill="#34d399">$</tspan><tspan fill="#cbd5e1"> duck pull build-a-hashmap</tspan><tspan fill="#64748b"> --lang=?</tspan></text>
  <line x1="24" y1="52" x2="616" y2="52" stroke="#1e2b24"/>

  <!-- the same Put(), three altitudes -->
  <rect x="24" y="76" width="184" height="116" fill="none" stroke="#27352d"/>
  <text xml:space="preserve" x="36" y="98" font-size="12" fill="#22d3ee">[ python ]</text>
  <g font-size="11" fill="#cbd5e1">
    <text xml:space="preserve" x="36" y="122">def put(self, k, v):</text>
    <text xml:space="preserve" x="36" y="140">  b = self.buckets[i]</text>
    <text xml:space="preserve" x="36" y="158">  b.append((k, v))</text>
  </g>
  <text xml:space="preserve" x="36" y="182" font-size="11" fill="#64748b">the runtime carries you</text>

  <text xml:space="preserve" x="219" y="138" font-size="14" fill="#22d3ee">→</text>

  <rect x="232" y="76" width="184" height="116" fill="none" stroke="#27352d"/>
  <text xml:space="preserve" x="244" y="98" font-size="12" fill="#22d3ee">[ go ]</text>
  <g font-size="11" fill="#cbd5e1">
    <text xml:space="preserve" x="244" y="122">i := hash(k) % n</text>
    <text xml:space="preserve" x="244" y="140">b := m.buckets[i]</text>
    <text xml:space="preserve" x="244" y="158">b = append(b, e{k, v})</text>
  </g>
  <text xml:space="preserve" x="244" y="182" font-size="11" fill="#64748b">you manage the buckets</text>

  <text xml:space="preserve" x="427" y="138" font-size="14" fill="#22d3ee">→</text>

  <rect x="440" y="76" width="184" height="116" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="440" y="76" width="184" height="116" fill="none" stroke="#22d3ee" stroke-width="6" opacity="0.12"/>
  <text xml:space="preserve" x="452" y="98" font-size="12" fill="#22d3ee">[ c ]</text>
  <g font-size="11" fill="#cbd5e1">
    <text xml:space="preserve" x="452" y="122">n-&gt;key = k; n-&gt;val = v;</text>
    <text xml:space="preserve" x="452" y="140">n-&gt;next = b-&gt;head;</text>
    <text xml:space="preserve" x="452" y="158">b-&gt;head = n;</text>
  </g>
  <text xml:space="preserve" x="452" y="182" font-size="11" fill="#64748b">you manage the bytes</text>

  <text xml:space="preserve" x="24" y="240" font-size="12" fill="#64748b">same course, three altitudes — closer to the metal each step</text>
</svg>
