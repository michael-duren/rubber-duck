<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 256" font-family="ui-monospace,'Cascadia Code',Menlo,Consolas,monospace">
  <rect width="640" height="256" fill="#0b120e"/>
  <text xml:space="preserve" x="24" y="36" font-size="15"><tspan fill="#34d399">$</tspan><tspan fill="#cbd5e1"> duck submit chaining</tspan></text>
  <line x1="24" y1="52" x2="616" y2="52" stroke="#1e2b24"/>

  <!-- your code goes in -->
  <rect x="24" y="72" width="240" height="104" fill="none" stroke="#27352d"/>
  <text xml:space="preserve" x="36" y="92" font-size="11" fill="#64748b">solution.go</text>
  <g font-size="12" fill="#cbd5e1">
    <text xml:space="preserve" x="36" y="114">func (m *Map) Put(k, v) {</text>
    <text xml:space="preserve" x="36" y="134">  i := hash(k) % len(m.b)</text>
    <text xml:space="preserve" x="36" y="154">  m.b[i] = append(m.b[i], e)</text>
    <text xml:space="preserve" x="36" y="170">}</text>
  </g>

  <path d="M264 124 L296 124" stroke="#fbbf24" stroke-width="1.5"/>
  <path d="M296 124 l-8 -5 v10 z" fill="#fbbf24"/>

  <!-- the sandbox it runs in -->
  <rect x="300" y="94" width="132" height="60" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="300" y="94" width="132" height="60" fill="none" stroke="#fbbf24" stroke-width="6" opacity="0.12"/>
  <text xml:space="preserve" x="366" y="118" font-size="13" fill="#fbbf24" text-anchor="middle">sandbox</text>
  <text xml:space="preserve" x="366" y="138" font-size="11" fill="#94a3b8" text-anchor="middle">no network · 30s</text>

  <path d="M432 124 L464 124" stroke="#fbbf24" stroke-width="1.5"/>
  <path d="M464 124 l-8 -5 v10 z" fill="#fbbf24"/>

  <!-- the verdict that comes out -->
  <g font-size="13">
    <text xml:space="preserve" x="472" y="92"><tspan fill="#34d399">✓</tspan><tspan fill="#cbd5e1"> TestPut</tspan></text>
    <text xml:space="preserve" x="472" y="114"><tspan fill="#34d399">✓</tspan><tspan fill="#cbd5e1"> TestGet</tspan></text>
    <text xml:space="preserve" x="472" y="136"><tspan fill="#34d399">✓</tspan><tspan fill="#cbd5e1"> TestGrow</tspan></text>
    <text xml:space="preserve" x="472" y="158"><tspan fill="#f87171">✗</tspan><tspan fill="#cbd5e1"> TestDelete</tspan></text>
    <text xml:space="preserve" x="472" y="190"><tspan fill="#64748b">3/4 — </tspan><tspan fill="#fbbf24">75/100 pts</tspan></text>
  </g>

  <text xml:space="preserve" x="24" y="240" font-size="12" fill="#64748b">your best submission counts — resubmitting can only help</text>
</svg>
