<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 256" font-family="ui-monospace,'Cascadia Code',Menlo,Consolas,monospace">
  <rect width="640" height="256" fill="#0b120e"/>
  <text xml:space="preserve" x="24" y="36" font-size="15"><tspan fill="#34d399">$</tspan><tspan fill="#cbd5e1"> kubectl get nodes</tspan><tspan fill="#64748b"> -o wide</tspan></text>
  <line x1="24" y1="52" x2="616" y2="52" stroke="#1e2b24"/>

  <!-- two proxmox hosts, each running cluster VMs -->
  <rect x="28" y="70" width="286" height="150" fill="none" stroke="#27352d"/>
  <text xml:space="preserve" x="40" y="88" font-size="12" fill="#64748b">▤ pve1</text>
  <rect x="326" y="70" width="286" height="150" fill="none" stroke="#27352d"/>
  <text xml:space="preserve" x="338" y="88" font-size="12" fill="#64748b">▤ pve2</text>

  <!-- control-plane VM (emphasised with a violet border) -->
  <rect x="44" y="100" width="120" height="104" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="44" y="100" width="120" height="104" fill="none" stroke="#a78bfa" stroke-width="6" opacity="0.12"/>
  <text xml:space="preserve" x="104" y="120" font-size="12" fill="#a78bfa" text-anchor="middle">control-plane</text>
  <text xml:space="preserve" x="104" y="138" font-size="10" fill="#94a3b8" text-anchor="middle">api · etcd</text>
  <text xml:space="preserve" x="104" y="152" font-size="10" fill="#94a3b8" text-anchor="middle">sched · ctrl</text>
  <rect x="60" y="164" width="14" height="14" fill="#a78bfa" opacity="0.8"/>
  <rect x="80" y="164" width="14" height="14" fill="#a78bfa" opacity="0.5"/>

  <!-- worker VMs run pods (little filled squares) -->
  <g>
    <rect x="178" y="100" width="120" height="104" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
    <text xml:space="preserve" x="238" y="120" font-size="12" fill="#94a3b8" text-anchor="middle">worker-1</text>
    <rect x="196" y="140" width="16" height="16" fill="#34d399" opacity="0.75"/>
    <rect x="220" y="140" width="16" height="16" fill="#34d399" opacity="0.5"/>
    <rect x="244" y="140" width="16" height="16" fill="#34d399" opacity="0.6"/>
    <rect x="196" y="166" width="16" height="16" fill="#34d399" opacity="0.4"/>
    <rect x="220" y="166" width="16" height="16" fill="none" stroke="#27352d"/>
  </g>
  <g>
    <rect x="342" y="100" width="120" height="104" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
    <text xml:space="preserve" x="402" y="120" font-size="12" fill="#94a3b8" text-anchor="middle">worker-2</text>
    <rect x="360" y="140" width="16" height="16" fill="#34d399" opacity="0.6"/>
    <rect x="384" y="140" width="16" height="16" fill="#34d399" opacity="0.45"/>
    <rect x="408" y="140" width="16" height="16" fill="#34d399" opacity="0.7"/>
    <rect x="360" y="166" width="16" height="16" fill="#34d399" opacity="0.5"/>
    <rect x="384" y="166" width="16" height="16" fill="#34d399" opacity="0.35"/>
  </g>
  <g>
    <rect x="476" y="100" width="120" height="104" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
    <text xml:space="preserve" x="536" y="120" font-size="12" fill="#94a3b8" text-anchor="middle">worker-3</text>
    <rect x="494" y="140" width="16" height="16" fill="#34d399" opacity="0.55"/>
    <rect x="518" y="140" width="16" height="16" fill="#34d399" opacity="0.4"/>
    <rect x="542" y="140" width="16" height="16" fill="#34d399" opacity="0.65"/>
    <rect x="494" y="166" width="16" height="16" fill="none" stroke="#27352d"/>
  </g>

  <!-- control plane schedules pods across the workers -->
  <path d="M164 152 L178 152" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4 4"/>
  <path d="M164 150 L342 132" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4 4"/>
  <path d="M164 158 L476 138" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4 4"/>

  <text xml:space="preserve" x="40" y="244" font-size="12" fill="#64748b">proxmox VMs · kubeadm · a real cluster in your closet</text>
</svg>
