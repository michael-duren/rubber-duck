<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 256" font-family="ui-monospace,'Cascadia Code',Menlo,Consolas,monospace">
  <rect width="640" height="256" fill="#0b120e"/>
  <text xml:space="preserve" x="24" y="36" font-size="15"><tspan fill="#34d399">$</tspan><tspan fill="#cbd5e1"> ./duckedit</tspan><tspan fill="#64748b"> main.cpp &amp;</tspan></text>
  <line x1="24" y1="52" x2="616" y2="52" stroke="#1e2b24"/>

  <!-- a real window, escaped from the terminal -->
  <rect x="70" y="66" width="500" height="158" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="70" y="66" width="500" height="158" fill="none" stroke="#22d3ee" stroke-width="6" opacity="0.1"/>
  <rect x="70" y="66" width="500" height="24" fill="#22d3ee" opacity="0.12"/>
  <circle cx="86" cy="78" r="4" fill="#f87171"/>
  <circle cx="100" cy="78" r="4" fill="#fbbf24"/>
  <circle cx="114" cy="78" r="4" fill="#34d399"/>
  <text xml:space="preserve" x="320" y="82" font-size="12" fill="#94a3b8" text-anchor="middle">duck edit — main.cpp</text>

  <text xml:space="preserve" x="86" y="108" font-size="12" fill="#94a3b8">File  Edit  View  Help</text>
  <line x1="70" y1="116" x2="570" y2="116" stroke="#1e2b24"/>

  <!-- file tree pane -->
  <line x1="200" y1="116" x2="200" y2="224" stroke="#1e2b24"/>
  <g font-size="12" fill="#64748b">
    <text xml:space="preserve" x="84" y="140">src/</text>
    <text xml:space="preserve" x="96" y="160" fill="#22d3ee">main.cpp</text>
    <text xml:space="preserve" x="96" y="180">editor.cpp</text>
    <text xml:space="preserve" x="84" y="200">Makefile</text>
  </g>
  <rect x="90" y="149" width="96" height="15" fill="#22d3ee" opacity="0.15"/>

  <!-- text pane with caret, and a scrollbar -->
  <rect x="216" y="132" width="240" height="8" fill="#22d3ee" opacity="0.25"/>
  <rect x="216" y="150" width="300" height="8" fill="#22d3ee" opacity="0.18"/>
  <rect x="216" y="168" width="180" height="8" fill="#22d3ee" opacity="0.3"/>
  <rect x="400" y="164" width="2" height="16" fill="#cbd5e1"/>
  <rect x="216" y="186" width="264" height="8" fill="#22d3ee" opacity="0.18"/>
  <rect x="556" y="120" width="8" height="100" fill="#1e2b24"/>
  <rect x="556" y="128" width="8" height="34" fill="#22d3ee" opacity="0.5"/>

  <!-- the mouse exists here -->
  <path d="M446 96 l0 16 4 -4 3 7 3 -1 -3 -7 6 0 z" fill="#cbd5e1" stroke="#0b120e" stroke-width="0.5"/>

  <text xml:space="preserve" x="40" y="244" font-size="12" fill="#64748b">event loop · widgets · one codebase, three platforms</text>
</svg>
