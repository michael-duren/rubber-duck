<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 256" font-family="ui-monospace,'Cascadia Code',Menlo,Consolas,monospace">
  <rect width="640" height="256" fill="#0b120e"/>
  <text xml:space="preserve" x="24" y="36" font-size="15"><tspan fill="#34d399">$</tspan><tspan fill="#cbd5e1"> ./term</tspan><tspan fill="#64748b"> -- bash</tspan></text>
  <line x1="24" y1="52" x2="616" y2="52" stroke="#1e2b24"/>

  <!-- shell writes bytes to the pty; the emulator renders cells -->
  <rect x="44" y="84" width="76" height="32" fill="none" stroke="#94a3b8"/>
  <text xml:space="preserve" x="82" y="105" font-size="13" fill="#94a3b8" text-anchor="middle">bash</text>

  <path d="M120 100 L172 100" stroke="#34d399" stroke-width="1.5"/>
  <path d="M172 100 l-8 -5 v10 z" fill="#34d399"/>

  <rect x="176" y="84" width="64" height="32" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <rect x="176" y="84" width="64" height="32" fill="none" stroke="#34d399" stroke-width="6" opacity="0.12"/>
  <text xml:space="preserve" x="208" y="105" font-size="13" fill="#cbd5e1" text-anchor="middle">pty</text>

  <path d="M240 100 L372 100" stroke="#34d399" stroke-width="1.5"/>
  <path d="M372 100 l-8 -5 v10 z" fill="#34d399"/>
  <text xml:space="preserve" x="248" y="130" font-size="13" fill="#64748b">\x1b[32m<tspan fill="#34d399">duck</tspan><tspan fill="#64748b">\x1b[0m</tspan></text>
  <text xml:space="preserve" x="248" y="150" font-size="11" fill="#64748b">bytes on the wire</text>

  <!-- the cell grid, with "duck" rendered where the escape said green -->
  <rect x="380" y="70" width="212" height="128" fill="none" stroke="#94a3b8"/>
  <g stroke="#1e2b24">
    <line x1="380" y1="102" x2="592" y2="102"/><line x1="380" y1="134" x2="592" y2="134"/><line x1="380" y1="166" x2="592" y2="166"/>
    <line x1="412" y1="70" x2="412" y2="198"/><line x1="444" y1="70" x2="444" y2="198"/><line x1="476" y1="70" x2="476" y2="198"/><line x1="508" y1="70" x2="508" y2="198"/><line x1="540" y1="70" x2="540" y2="198"/>
  </g>
  <g font-size="15" fill="#34d399" text-anchor="middle">
    <text xml:space="preserve" x="396" y="124">d</text><text xml:space="preserve" x="428" y="124">u</text><text xml:space="preserve" x="460" y="124">c</text><text xml:space="preserve" x="492" y="124">k</text>
  </g>
  <rect x="510" y="108" width="18" height="20" fill="#34d399" opacity="0.85"/>
  <text xml:space="preserve" x="486" y="216" font-size="11" fill="#64748b" text-anchor="middle">cells 80×24</text>

  <text xml:space="preserve" x="40" y="228" font-size="12" fill="#64748b">raw mode · escape parser · a screen you drew yourself</text>
</svg>
