<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 256" font-family="ui-monospace,'Cascadia Code',Menlo,Consolas,monospace">
  <rect width="640" height="256" fill="#0b120e"/>
  <text xml:space="preserve" x="24" y="36" font-size="15"><tspan fill="#34d399">$</tspan><tspan fill="#cbd5e1"> picotool load</tspan><tspan fill="#64748b"> blink.uf2</tspan></text>
  <line x1="24" y1="52" x2="616" y2="52" stroke="#1e2b24"/>

  <!-- the board itself -->
  <rect x="170" y="76" width="300" height="128" fill="#0f1f16" stroke="#34d399" stroke-width="1.5" rx="4"/>
  <rect x="170" y="76" width="300" height="128" fill="none" stroke="#34d399" stroke-width="6" opacity="0.1" rx="4"/>

  <!-- castellated pads -->
  <g fill="#94a3b8" opacity="0.75">
    <rect x="186" y="78" width="9" height="9"/><rect x="207" y="78" width="9" height="9"/><rect x="228" y="78" width="9" height="9"/><rect x="249" y="78" width="9" height="9"/><rect x="270" y="78" width="9" height="9"/><rect x="291" y="78" width="9" height="9"/><rect x="312" y="78" width="9" height="9"/><rect x="333" y="78" width="9" height="9"/><rect x="354" y="78" width="9" height="9"/><rect x="375" y="78" width="9" height="9"/><rect x="396" y="78" width="9" height="9"/><rect x="417" y="78" width="9" height="9"/><rect x="438" y="78" width="9" height="9"/>
    <rect x="186" y="193" width="9" height="9"/><rect x="207" y="193" width="9" height="9"/><rect x="228" y="193" width="9" height="9"/><rect x="249" y="193" width="9" height="9"/><rect x="270" y="193" width="9" height="9"/><rect x="291" y="193" width="9" height="9"/><rect x="312" y="193" width="9" height="9"/><rect x="333" y="193" width="9" height="9"/><rect x="354" y="193" width="9" height="9"/><rect x="375" y="193" width="9" height="9"/><rect x="396" y="193" width="9" height="9"/><rect x="417" y="193" width="9" height="9"/><rect x="438" y="193" width="9" height="9"/>
  </g>

  <!-- usb -->
  <rect x="156" y="122" width="20" height="36" fill="#64748b"/>
  <rect x="160" y="128" width="12" height="24" fill="#0b120e"/>

  <!-- rp2040 + bootsel -->
  <rect x="292" y="112" width="56" height="56" fill="#0b120e" stroke="#94a3b8"/>
  <text xml:space="preserve" x="320" y="137" font-size="10" fill="#94a3b8" text-anchor="middle">RP2040</text>
  <text xml:space="preserve" x="320" y="151" font-size="9" fill="#64748b" text-anchor="middle">2×M0+</text>
  <rect x="216" y="128" width="30" height="20" fill="none" stroke="#64748b"/>
  <circle cx="231" cy="138" r="5" fill="#27352d" stroke="#64748b"/>

  <!-- the blinking LED, mid-blink -->
  <rect x="404" y="112" width="16" height="12" fill="#34d399"/>
  <g stroke="#34d399" stroke-width="1.2">
    <line x1="412" y1="104" x2="412" y2="94" opacity="0.8"/>
    <line x1="425" y1="108" x2="433" y2="100" opacity="0.55"/>
    <line x1="399" y1="108" x2="391" y2="100" opacity="0.55"/>
  </g>
  <text xml:space="preserve" x="412" y="140" font-size="10" fill="#34d399" text-anchor="middle" opacity="0.85">GP25</text>

  <text xml:space="preserve" x="492" y="110" font-size="12" fill="#64748b">*(volatile</text>
  <text xml:space="preserve" x="492" y="126" font-size="12" fill="#64748b"> u32*)</text>
  <text xml:space="preserve" x="492" y="142" font-size="12" fill="#64748b">0xd0000014</text>

  <text xml:space="preserve" x="40" y="236" font-size="12" fill="#64748b">no OS below you — datasheets, registers, and a blinking LED</text>
</svg>
