<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 256" font-family="ui-monospace,'Cascadia Code',Menlo,Consolas,monospace">
  <rect width="640" height="256" fill="#0b120e"/>
  <text xml:space="preserve" x="24" y="36" font-size="15"><tspan fill="#34d399">$</tspan><tspan fill="#cbd5e1"> python3 listen.py</tspan><tspan fill="#64748b"> :9000</tspan></text>
  <line x1="24" y1="52" x2="616" y2="52" stroke="#1e2b24"/>

  <!-- the Pico W board -->
  <rect x="40" y="92" width="150" height="120" fill="#0f1f16" stroke="#34d399" stroke-width="1.5" rx="4"/>
  <rect x="40" y="92" width="150" height="120" fill="none" stroke="#34d399" stroke-width="6" opacity="0.1" rx="4"/>
  <!-- castellated pads down each edge -->
  <g fill="#94a3b8" opacity="0.7">
    <rect x="44" y="98" width="7" height="7"/><rect x="44" y="118" width="7" height="7"/><rect x="44" y="138" width="7" height="7"/><rect x="44" y="158" width="7" height="7"/><rect x="44" y="178" width="7" height="7"/><rect x="44" y="198" width="7" height="7"/>
    <rect x="179" y="98" width="7" height="7"/><rect x="179" y="118" width="7" height="7"/><rect x="179" y="138" width="7" height="7"/><rect x="179" y="158" width="7" height="7"/><rect x="179" y="178" width="7" height="7"/><rect x="179" y="198" width="7" height="7"/>
  </g>
  <!-- usb -->
  <rect x="28" y="140" width="14" height="26" fill="#64748b"/>
  <rect x="31" y="145" width="8" height="16" fill="#0b120e"/>
  <!-- rp2040 -->
  <rect x="78" y="150" width="46" height="46" fill="#0b120e" stroke="#94a3b8"/>
  <text xml:space="preserve" x="101" y="177" font-size="9" fill="#94a3b8" text-anchor="middle">RP2040</text>
  <!-- cyw43 radio module (metal can) -->
  <rect x="128" y="104" width="52" height="34" fill="#0b120e" stroke="#22d3ee"/>
  <text xml:space="preserve" x="154" y="118" font-size="9" fill="#22d3ee" text-anchor="middle">CYW43</text>
  <text xml:space="preserve" x="154" y="130" font-size="8" fill="#64748b" text-anchor="middle">2.4GHz</text>
  <!-- status LED, lit -->
  <rect x="60" y="112" width="12" height="9" fill="#34d399"/>
  <text xml:space="preserve" x="66" y="135" font-size="8" fill="#34d399" text-anchor="middle">GP15</text>
  <text xml:space="preserve" x="115" y="207" font-size="9" fill="#64748b" text-anchor="middle">Pico W · TCP client</text>

  <!-- wifi waves rising off the radio -->
  <g stroke="#22d3ee" fill="none" stroke-linecap="round">
    <path d="M186 108 a10 10 0 0 1 10 10" opacity="0.9"/>
    <path d="M186 100 a18 18 0 0 1 18 18" opacity="0.6"/>
    <path d="M186 92 a26 26 0 0 1 26 26" opacity="0.35"/>
  </g>

  <!-- framed records flying to the listener: [len][payload][crc] -->
  <g>
    <rect x="228" y="96" width="10" height="12" fill="#22d3ee" opacity="0.85"/>
    <rect x="239" y="96" width="34" height="12" fill="#22d3ee" opacity="0.28"/>
    <rect x="274" y="96" width="10" height="12" fill="#fbbf24" opacity="0.8"/>

    <rect x="252" y="128" width="10" height="12" fill="#22d3ee" opacity="0.85"/>
    <rect x="263" y="128" width="34" height="12" fill="#22d3ee" opacity="0.28"/>
    <rect x="298" y="128" width="10" height="12" fill="#fbbf24" opacity="0.8"/>

    <rect x="230" y="160" width="10" height="12" fill="#22d3ee" opacity="0.85"/>
    <rect x="241" y="160" width="34" height="12" fill="#22d3ee" opacity="0.28"/>
    <rect x="276" y="160" width="10" height="12" fill="#fbbf24" opacity="0.8"/>
  </g>
  <text xml:space="preserve" x="205" y="196" font-size="10" fill="#64748b">[len][payload][crc] →</text>

  <!-- the listener window on your laptop -->
  <rect x="360" y="72" width="252" height="152" fill="#0b0f0d" stroke="#22d3ee" stroke-width="1.5" rx="3"/>
  <rect x="360" y="72" width="252" height="20" fill="#22d3ee" opacity="0.12"/>
  <circle cx="372" cy="82" r="3" fill="#f87171"/>
  <circle cx="383" cy="82" r="3" fill="#fbbf24"/>
  <circle cx="394" cy="82" r="3" fill="#34d399"/>
  <text xml:space="preserve" x="486" y="86" font-size="10" fill="#94a3b8" text-anchor="middle">listener — :9000</text>
  <g font-size="11" xml:space="preserve">
    <text x="372" y="112" fill="#64748b">pico connected 192.168.1.37</text>
    <text x="372" y="132"><tspan fill="#34d399">AP  </tspan><tspan fill="#cbd5e1">HomeNet     -52  ch6  wpa2</tspan></text>
    <text x="372" y="150"><tspan fill="#34d399">AP  </tspan><tspan fill="#cbd5e1">&lt;hidden&gt;    -80  ch1  open</tspan></text>
    <text x="372" y="168"><tspan fill="#22d3ee">HOST</tspan><tspan fill="#cbd5e1"> 192.168.1.1   up  open</tspan></text>
    <text x="372" y="186"><tspan fill="#22d3ee">HOST</tspan><tspan fill="#cbd5e1"> 192.168.1.37  up  self</tspan></text>
    <text x="372" y="206"><tspan fill="#f87171">!! </tspan><tspan fill="#64748b">crc mismatch — dropped</tspan></text>
  </g>

  <text xml:space="preserve" x="40" y="244" font-size="12" fill="#64748b">scan the network · frame it · stream it to your laptop</text>
</svg>
