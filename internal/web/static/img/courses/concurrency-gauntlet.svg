<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 256" font-family="ui-monospace,'Cascadia Code',Menlo,Consolas,monospace">
  <rect width="640" height="256" fill="#0b120e"/>
  <text xml:space="preserve" x="24" y="36" font-size="15"><tspan fill="#34d399">$</tspan><tspan fill="#cbd5e1"> go test</tspan><tspan fill="#64748b"> -race ./...</tspan></text>
  <line x1="24" y1="52" x2="616" y2="52" stroke="#1e2b24"/>

  <text xml:space="preserve" x="40" y="82" font-size="13"><tspan fill="#f87171">[███</tspan><tspan fill="#3f2a2a">▒▒▒</tspan><tspan fill="#f87171">]</tspan><tspan fill="#94a3b8"> 3/6 drills survived</tspan></text>

  <!-- six gates; three cleared, the race detector guards the fourth -->
  <g font-size="11" text-anchor="middle">
    <rect x="44" y="104" width="72" height="60" fill="none" stroke="#27352d" stroke-width="1.5"/>
    <text xml:space="preserve" x="80" y="142" font-size="24" fill="#34d399">✓</text>
    <text xml:space="preserve" x="80" y="184" fill="#64748b">select</text>

    <rect x="136" y="104" width="72" height="60" fill="none" stroke="#27352d" stroke-width="1.5"/>
    <text xml:space="preserve" x="172" y="142" font-size="24" fill="#34d399">✓</text>
    <text xml:space="preserve" x="172" y="184" fill="#64748b">clock</text>

    <rect x="228" y="104" width="72" height="60" fill="none" stroke="#27352d" stroke-width="1.5"/>
    <text xml:space="preserve" x="264" y="142" font-size="24" fill="#34d399">✓</text>
    <text xml:space="preserve" x="264" y="184" fill="#64748b">sema</text>

    <rect x="320" y="104" width="72" height="60" fill="none" stroke="#f87171" stroke-width="1.5"/>
    <rect x="320" y="104" width="72" height="60" fill="none" stroke="#f87171" stroke-width="6" opacity="0.15"/>
    <text xml:space="preserve" x="356" y="142" font-size="22" fill="#f87171">▊</text>
    <text xml:space="preserve" x="356" y="184" fill="#f87171">barrier</text>

    <rect x="412" y="104" width="72" height="60" fill="none" stroke="#27352d" stroke-width="1.5" opacity="0.7"/>
    <text xml:space="preserve" x="448" y="142" font-size="18" fill="#64748b">?</text>
    <text xml:space="preserve" x="448" y="184" fill="#64748b" opacity="0.7">flight</text>

    <rect x="504" y="104" width="72" height="60" fill="none" stroke="#27352d" stroke-width="1.5" opacity="0.7"/>
    <text xml:space="preserve" x="540" y="142" font-size="18" fill="#64748b">?</text>
    <text xml:space="preserve" x="540" y="184" fill="#64748b" opacity="0.7">pipeline</text>
  </g>

  <text xml:space="preserve" x="40" y="224" font-size="12" fill="#64748b">WARNING: DATA RACE <tspan fill="#f87171">— the tests punish leaks, deadlocks, reordering</tspan></text>
</svg>
