<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 256" font-family="ui-monospace,'Cascadia Code',Menlo,Consolas,monospace">
  <rect width="640" height="256" fill="#0b120e"/>
  <text xml:space="preserve" x="24" y="36" font-size="15"><tspan fill="#34d399">$</tspan><tspan fill="#cbd5e1"> ./serve</tspan><tspan fill="#64748b"> --timeout=50ms</tspan></text>
  <line x1="24" y1="52" x2="616" y2="52" stroke="#1e2b24"/>

  <!-- context tree: root ctx fans out; the right subtree gets cancelled -->
  <rect x="250" y="66" width="140" height="28" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="250" y="66" width="140" height="28" fill="none" stroke="#22d3ee" stroke-width="6" opacity="0.12"/>
  <text xml:space="preserve" x="320" y="85" font-size="13" fill="#cbd5e1" text-anchor="middle">ctx, cancel</text>

  <path d="M320 94 L140 148" stroke="#27352d" stroke-width="1.5" fill="none"/>
  <path d="M320 94 L330 148" stroke="#27352d" stroke-width="1.5" fill="none"/>
  <path d="M320 94 L520 148" stroke="#f87171" stroke-width="1.5" fill="none" stroke-dasharray="5 4"/>
  <text xml:space="preserve" x="452" y="118" font-size="12" fill="#f87171">cancel()</text>

  <rect x="80" y="148" width="120" height="28" fill="none" stroke="#22d3ee"/>
  <text xml:space="preserve" x="140" y="167" font-size="13" fill="#94a3b8" text-anchor="middle">worker A</text>
  <text xml:space="preserve" x="140" y="196" font-size="11" fill="#64748b" text-anchor="middle">working…</text>

  <rect x="270" y="148" width="120" height="28" fill="none" stroke="#22d3ee"/>
  <text xml:space="preserve" x="330" y="167" font-size="13" fill="#94a3b8" text-anchor="middle">worker B</text>
  <text xml:space="preserve" x="330" y="196" font-size="11" fill="#64748b" text-anchor="middle">working…</text>

  <rect x="460" y="148" width="120" height="28" fill="none" stroke="#f87171" opacity="0.8"/>
  <text xml:space="preserve" x="520" y="167" font-size="13" fill="#f87171" text-anchor="middle">worker C</text>
  <text xml:space="preserve" x="520" y="196" font-size="11" fill="#f87171" text-anchor="middle" opacity="0.8">&lt;-ctx.Done()</text>

  <text xml:space="preserve" x="40" y="228" font-size="12" fill="#64748b">context · atomics · errgroup — cancellation flows down the tree</text>
</svg>
