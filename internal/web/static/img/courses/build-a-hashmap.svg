  <text xml:space="preserve" x="190" y="127" font-size="13" fill="#cbd5e1" text-anchor="middle">fnv1a(k)</text>

  <path d="M236 123 L280 123" stroke="#e879f9" stroke-width="1.5"/>
  <path d="M280 123 l-8 -5 v10 z" fill="#e879f9"/>
  <text xml:space="preserve" x="258" y="112" font-size="12" fill="#64748b" text-anchor="middle">%8</text>

  <!-- the bucket array -->
  <g font-size="11" fill="#64748b">
    <text xml:space="preserve" x="298" y="80" >[0]</text><rect x="322" y="68" width="26" height="17" fill="none" stroke="#27352d"/>
