    <rect x="330" y="93" width="10" height="9" fill="#e879f9" opacity="0.4"/>
    <text xml:space="preserve" x="298" y="122">[2]</text><rect x="322" y="110" width="26" height="17" fill="none" stroke="#27352d"/>
    <text xml:space="preserve" x="298" y="143" fill="#e879f9">[3]</text><rect x="322" y="131" width="26" height="17" fill="none" stroke="#e879f9" stroke-width="1.5"/>
    <rect x="330" y="135" width="10" height="9" fill="#e879f9"/>
    <text xml:space="preserve" x="298" y="164">[4]</text><rect x="322" y="152" width="26" height="17" fill="none" stroke="#27352d"/>
    <text xml:space="preserve" x="298" y="185">[5]</text><rect x="322" y="173" width="26" height="17" fill="none" stroke="#27352d"/>
    <rect x="330" y="177" width="10" height="9" fill="#e879f9" opacity="0.4"/>
    <text xml:space="preserve" x="298" y="206">[6]</text><rect x="322" y="194" width="26" height="17" fill="none" stroke="#27352d"/>
    <text xml:space="preserve" x="298" y="227">[7]</text><rect x="322" y="215" width="26" height="17" fill="none" stroke="#27352d"/>
  </g>

  <!-- collision chain off bucket 3 -->
  <path d="M348 139 L392 139" stroke="#e879f9" stroke-width="1.5"/>
  <path d="M392 139 l-8 -5 v10 z" fill="#e879f9"/>
  <rect x="396" y="124" width="92" height="30" fill="none" stroke="#e879f9"/>
  <text xml:space="preserve" x="442" y="143" font-size="12" fill="#cbd5e1" text-anchor="middle">duck: 42</text>
  <path d="M488 139 L520 139" stroke="#94a3b8" stroke-width="1.2"/>
  <path d="M520 139 l-8 -5 v10 z" fill="#94a3b8"/>
  <rect x="524" y="124" width="76" height="30" fill="none" stroke="#94a3b8" opacity="0.8"/>
  <text xml:space="preserve" x="562" y="143" font-size="12" fill="#94a3b8" text-anchor="middle">goose:7</text>
  <text xml:space="preserve" x="562" y="172" font-size="12" fill="#64748b" text-anchor="middle">→ ∅</text>

  <text xml:space="preserve" x="440" y="220" font-size="12" fill="#64748b">load 0.62 — resize at 0.75</text>
