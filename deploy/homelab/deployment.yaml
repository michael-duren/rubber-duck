apiVersion: apps/v1
kind: Deployment
metadata:
  name: duckserver
  namespace: duck
spec:
  # Single replica: the grader pool is in-process and the image is imported
  # node-by-node, so keep scheduling predictable for the POC.
  replicas: 1
  selector:
    matchLabels:
      app: duckserver
  template:
    metadata:
      labels:
        app: duckserver
    spec:
      # Grants exactly the pod/configmap access the k8s grader needs.
      serviceAccountName: duckserver
      containers:
        - name: duckserver
          # Imported straight into the nodes' containerd by deploy-homelab.sh;
          # there is no registry, so never try to pull.
          image: duckserver:homelab
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: GC_GRADER
              value: k8s
            # Single-user homelab: one approval publishes a proposal.
            - name: GC_APPROVAL_THRESHOLD
              value: "1"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: duckserver-db
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
