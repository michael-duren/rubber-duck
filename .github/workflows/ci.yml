name: CI

# PRs only. Pushes to main are covered by cd.yml, whose `test` job (the
# deploy gate) is the same reusable test.yml — running it here too would
# just double-run tests on every merge.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# A new push to the same PR obsoletes the in-flight run — cancel it.
concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/test.yml
