name: CD

on:
  push:
    branches: [main]

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Requires a "production" environment (Settings > Environments) with
    # required reviewers configured. infra/network.tf landed on main
    # already but was deliberately left un-applied pending human review
    # (see issues/ops/03-job-egress-lockdown.md) — do NOT remove this gate
    # or set `tofu apply` to auto-run without it, or the next merge to
    # main will silently apply that untested change to prod.
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT: ${{ vars.GCP_PROJECT_ID }}
      REGION: us-central1
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - uses: opentofu/setup-opentofu@v1

      - name: Build and push images
        run: make push-images PROJECT="$PROJECT" REGION="$REGION"

      # Not `make deploy`: that target's `tofu apply` is intentionally
      # interactive for local use. CD substitutes the environment's
      # required-reviewer approval for that human-in-the-loop check, so
      # it applies non-interactively here instead.
      - name: tofu apply
        working-directory: infra
        run: |
          tofu init
          tofu apply -auto-approve \
            -var project_id="$PROJECT" \
            -var region="$REGION" \
            -var image_tag="$(git rev-parse --short HEAD)"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      # After (not before) the deploy, so courses are validated by the
      # ingest parser version they'll be served by. Re-publishing a
      # course variant cascades (lessons/challenges/submissions are
      # replaced) — that's the documented agent contract; slugs stay
      # stable in courses/*.md. GC_API_KEY is a repo secret minted with
      # `duckserver apikey create` against the prod DB.
      - name: Sync courses to prod
        env:
          GC_API_KEY: ${{ secrets.GC_API_KEY }}
        run: make publish GC_URL="$(tofu -chdir=infra output -raw service_url)"

  # Tag the deployed commit so goreleaser has a release tag to build from.
  # Runs after deploy (not just test) so the binaries under releases/latest
  # always match the server version actually running in prod — the web
  # UI's /cli page links here.
  #
  # Plain semver tags (not e.g. duck-v0.1.N) on purpose: the Go toolchain
  # only recognizes vX.Y.Z, so this is what makes
  # `go install .../cmd/duck@latest` resolve to the tagged release commit,
  # and `duck version` report the same tag for go-installed builds (via
  # ReadBuildInfo) as for the goreleaser-stamped binaries.
  #
  # goreleaser runs in this workflow (not a separate on-tag one) because
  # tags pushed with GITHUB_TOKEN don't trigger other workflows.
  tag:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create and push release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v0.1.${{ github.run_number }}"
          git push origin "v0.1.${{ github.run_number }}"

  # Publish the duck CLI: GitHub Release with raw binaries (named as the
  # /cli page's curl instructions expect) + archives, and push the
  # Homebrew cask to michael-duren/homebrew-tap. See .goreleaser.yaml.
  goreleaser:
    name: "Release"
    needs:
      - test
      - tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
