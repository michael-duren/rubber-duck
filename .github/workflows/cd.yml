name: CD

on:
  push:
    branches: [main]

# Default for jobs without their own block (the reusable test job); the
# deploy job widens this itself with id-token: write.
permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Requires a "production" environment (Settings > Environments) with
    # required reviewers configured. infra/network.tf landed on main
    # already but was deliberately left un-applied pending human review
    # (see issues/ops/03-job-egress-lockdown.md) — do NOT remove this gate
    # or set `tofu apply` to auto-run without it, or the next merge to
    # main will silently apply that untested change to prod.
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT: ${{ vars.GCP_PROJECT_ID }}
      REGION: us-central1
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.26.4"
          cache: true

      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1.0.8

      - name: Build and push images
        run: make push-images PROJECT="$PROJECT" REGION="$REGION"

      # Not `make deploy`: that target's `tofu apply` is intentionally
      # interactive for local use. CD substitutes the environment's
      # required-reviewer approval for that human-in-the-loop check, so
      # it applies non-interactively here instead.
      - name: tofu apply
        working-directory: infra
        run: |
          tofu init
          tofu apply -auto-approve \
            -var project_id="$PROJECT" \
            -var region="$REGION" \
            -var image_tag="$(git rev-parse --short HEAD)"

      # No course-publish step: the database is the source of truth for
      # course content now (changes go through the in-app proposal/review
      # workflow), and courses/ in this repo is a mirror kept fresh by
      # .github/workflows/course-sync.yml pulling from /api/v1/export.
