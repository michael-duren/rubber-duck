# Keeps courses/*.md a faithful mirror of what's published on the server.
# The database is the source of truth (content changes go through the
# in-app proposal/review workflow); this workflow pulls the public
# /api/v1/export on a schedule and opens a PR when the mirror has drifted.
# The PR auto-merges once CI passes — content was already human-reviewed in
# the app, and CI's ingest tests (internal/ingest TestCanonicalCoursesParse)
# re-verify every document parses.
#
# A fixed branch name + force-push keeps at most one sync PR open; each new
# drift updates the same PR rather than stacking new ones.
name: Course sync

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export courses from production
        run: DUCK_BASE_URL=https://duckgc.com ./scripts/export-courses.sh

      - name: Open (or update) the sync PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- courses; then
            echo "mirror is up to date"
            exit 0
          fi
          git config user.name "course-sync"
          git config user.email "course-sync@users.noreply.github.com"
          git checkout -B course-sync
          git add courses
          git commit -m "chore: sync courses/ mirror from production"
          git push -f origin course-sync
          # Create the PR if none exists for this branch; otherwise the
          # force-push above already updated it.
          if ! gh pr view course-sync --json number >/dev/null 2>&1; then
            gh pr create \
              --head course-sync \
              --title "chore: sync courses/ mirror from production" \
              --body "Automated mirror refresh from /api/v1/export. Content was reviewed in-app; CI re-verifies every document parses. Auto-merges on green."
          fi
          gh pr merge course-sync --auto --squash
