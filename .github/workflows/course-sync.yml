# Keeps courses/*.md a faithful mirror of what's published on the server.
# The database is the source of truth (content changes go through the
# in-app proposal/review workflow); this workflow pulls the public
# /api/v1/export on a schedule and opens a PR when the mirror has drifted.
# The PR auto-merges once CI passes — content was already human-reviewed in
# the app, and CI's ingest tests (internal/ingest TestCanonicalCoursesParse)
# re-verify every document parses.
#
# A fixed branch name + force-push keeps at most one sync PR open; each new
# drift updates the same PR rather than stacking new ones.
name: Course sync

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# One sync at a time: overlapping runs (schedule + manual dispatch) would
# race the force-push and the PR create/merge sequence.
concurrency:
  group: course-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # COURSE_SYNC_TOKEN is a fine-grained PAT (contents + pull-requests:
      # write, this repo only). It exists because events created with the
      # default GITHUB_TOKEN deliberately don't trigger other workflows: a
      # sync PR pushed with github.token would never get a CI run, so
      # auto-merge would either wait forever (required checks) or be
      # rejected outright (no checks to wait on). The github.token fallback
      # keeps the job producing a PR (manually mergeable) if the secret is
      # ever missing.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.COURSE_SYNC_TOKEN || github.token }}

      - name: Export courses from production
        run: DUCK_BASE_URL=https://duckgc.com ./scripts/export-courses.sh

      - name: Open (or update) the sync PR
        env:
          GH_TOKEN: ${{ secrets.COURSE_SYNC_TOKEN || github.token }}
        run: |
          # Stage first, then diff the index: `git diff` alone ignores
          # untracked files, so a drift consisting only of a brand-new
          # course file would read as "up to date" and never sync.
          git add -A courses
          if git diff --cached --quiet -- courses; then
            echo "mirror is up to date"
            exit 0
          fi
          git config user.name "course-sync"
          git config user.email "course-sync@users.noreply.github.com"
          git checkout -B course-sync
          git commit -m "chore: sync courses/ mirror from production"
          git push -f origin course-sync
          # Create the PR only if no OPEN one exists for this branch (an
          # open one was just updated by the force-push). The state filter
          # matters: bare `gh pr view` falls back to resolving MERGED and
          # CLOSED PRs for non-default branches, which after the first
          # merged sync would skip the create and then fail the merge —
          # bricking every later sync.
          if [ "$(gh pr list --head course-sync --state open --json number --jq length)" = "0" ]; then
            gh pr create \
              --head course-sync \
              --title "chore: sync courses/ mirror from production" \
              --body "Automated mirror refresh from /api/v1/export. Content was reviewed in-app; CI re-verifies every document parses. Auto-merges on green."
          fi
          gh pr merge course-sync --auto --squash
