services:
  app:
    build: .
    ports:
      # Loopback only: dev creds are weak and the app mounts the docker
      # socket — don't expose either service to the LAN.
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: postgres://duckserver:duckserver@postgres:5432/duckserver?sslmode=disable
    volumes:
      # M1 grading runs sibling containers via the host daemon. Not hardened;
      # replaced behind the Grader interface in milestone 2.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: duckserver
      POSTGRES_PASSWORD: duckserver
      POSTGRES_DB: duckserver
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duckserver"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
